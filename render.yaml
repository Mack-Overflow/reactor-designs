databases:
  - name: reactor-db
    plan: free
    databaseName: reactor_sim
    user: reactor
    postgresMajorVersion: "16"

services:
  - type: web
    name: reactor-api
    runtime: docker
    plan: free
    region: oregon
    rootDir: api
    dockerfilePath: ./Dockerfile.prod
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: reactor-db
          property: connectionString
      - key: RUST_LOG
        value: info,reactor_api=debug
      - key: API_HOST
        value: 0.0.0.0
      - key: SIMULATION_RETENTION_DAYS
        value: "30"

  - type: web
    name: reactor-ui
    runtime: static
    rootDir: ui
    buildCommand: npm ci && npm run build
    staticPublishPath: ./build
    envVars:
      - key: VITE_API_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
